name: Feature request
description: Suggest an idea for this project
title: "[Feature]: "
labels: ["기능"]
body:
  - type: markdown
    attributes:
      value: |
        새로운 기능에 대해서 설명해주세요.
  - type: textarea
    id: context
    attributes:
      label: 기능
      description: 어떤 기능인가요?
      placeholder: 추가됐으면 하는 기능을 설명해주세요!
    validations:
      required: true
  - type: textarea
    id: motivation
    attributes:
      label: 이 기능이 왜 필요한가요?
      description: 어떤 문제를 해결하거나 불편함을 개선하나요?
      placeholder: 현재 어떤 점이 불편한지 알려주세요!
    validations:
      required: false
